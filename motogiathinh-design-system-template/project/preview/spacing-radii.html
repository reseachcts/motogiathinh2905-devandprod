<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--ink-1); }
  .row { display: flex; gap: 14px; align-items: flex-end; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
  .box { background: var(--ink-3); border: 1px solid var(--glass-stroke); }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); letter-spacing: 0.08em; }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--fg-1); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="width: 64px; height: 64px; border-radius: 6px;"></div><span class="name">xs</span><span class="lbl">6px</span></div>
    <div class="col"><div class="box" style="width: 64px; height: 64px; border-radius: 10px;"></div><span class="name">sm</span><span class="lbl">10px</span></div>
    <div class="col"><div class="box" style="width: 64px; height: 64px; border-radius: 14px;"></div><span class="name">md</span><span class="lbl">14px</span></div>
    <div class="col"><div class="box" style="width: 64px; height: 64px; border-radius: 20px;"></div><span class="name">lg</span><span class="lbl">20px</span></div>
    <div class="col"><div class="box" style="width: 64px; height: 64px; border-radius: 28px;"></div><span class="name">xl</span><span class="lbl">28px</span></div>
    <div class="col"><div class="box" style="width: 64px; height: 32px; border-radius: 999px;"></div><span class="name">pill</span><span class="lbl">999px</span></div>
  </div>
</body>
</html>
