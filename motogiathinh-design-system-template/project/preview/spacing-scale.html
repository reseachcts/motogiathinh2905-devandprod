<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 32px; background: var(--ink-1); }
  .stack { display: flex; flex-direction: column; gap: 8px; }
  .row { display: grid; grid-template-columns: 48px 1fr 60px; align-items: center; gap: 14px; }
  .nm { font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); letter-spacing: 0.04em; }
  .bar { height: 8px; background: linear-gradient(90deg, var(--neon-cyan), var(--neon-violet)); border-radius: 999px; box-shadow: 0 0 12px var(--neon-cyan-glow); }
  .px { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); text-align: right; }
</style>
</head>
<body>
  <div class="stack">
    <div class="row"><span class="nm">s-1</span><div class="bar" style="width: 4px"></div><span class="px">4 px</span></div>
    <div class="row"><span class="nm">s-2</span><div class="bar" style="width: 8px"></div><span class="px">8 px</span></div>
    <div class="row"><span class="nm">s-3</span><div class="bar" style="width: 12px"></div><span class="px">12 px</span></div>
    <div class="row"><span class="nm">s-4</span><div class="bar" style="width: 16px"></div><span class="px">16 px</span></div>
    <div class="row"><span class="nm">s-5</span><div class="bar" style="width: 20px"></div><span class="px">20 px</span></div>
    <div class="row"><span class="nm">s-6</span><div class="bar" style="width: 24px"></div><span class="px">24 px</span></div>
    <div class="row"><span class="nm">s-7</span><div class="bar" style="width: 32px"></div><span class="px">32 px</span></div>
    <div class="row"><span class="nm">s-8</span><div class="bar" style="width: 40px"></div><span class="px">40 px</span></div>
    <div class="row"><span class="nm">s-9</span><div class="bar" style="width: 56px"></div><span class="px">56 px</span></div>
    <div class="row"><span class="nm">s-10</span><div class="bar" style="width: 80px"></div><span class="px">80 px</span></div>
  </div>
</body>
</html>
