<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--ink-1); position: relative; overflow: hidden; }
  body::before { content:""; position:absolute; inset:0;
    background: radial-gradient(420px 200px at 50% 30%, var(--neon-cyan-haze), transparent 60%); }
  .row { display: flex; gap: 18px; align-items: stretch; position: relative; }
  .nav {
    width: 220px; background: var(--glass-2); backdrop-filter: var(--glass-blur);
    border: 1px solid var(--glass-stroke); border-radius: 20px;
    padding: 14px 12px; display: flex; flex-direction: column; gap: 4px;
  }
  .item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 10px; font-family: var(--font-ui); font-size: 13px; font-weight: 500; color: var(--fg-2); cursor: pointer; }
  .item:hover { background: var(--glass-2); color: var(--fg-1); }
  .item.active { background: var(--ink-3); color: var(--fg-1); border: 1px solid var(--neon-cyan); box-shadow: 0 0 18px var(--neon-cyan-haze); }
  .item.active svg { color: var(--neon-cyan); filter: drop-shadow(0 0 6px var(--neon-cyan-glow)); }
  svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
  .right { flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .toolbar { background: var(--glass-2); backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-stroke); border-radius: 14px; padding: 8px 12px; display: flex; align-items: center; gap: 10px; }
  .search { flex: 1; display: flex; align-items: center; gap: 8px; background: var(--ink-2); border: 1px solid var(--glass-stroke); border-radius: 10px; padding: 6px 10px; color: var(--fg-3); font-family: var(--font-ui); font-size: 12px; }
  .kbd { font-family: var(--font-mono); font-size: 10px; padding: 2px 6px; border: 1px solid var(--glass-stroke); border-radius: 4px; color: var(--fg-3); margin-left: auto;}
</style>
</head>
<body>
  <div class="row">
    <div class="nav">
      <div class="item"><svg viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg>Dashboard</div>
      <div class="item active"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>Students</div>
      <div class="item"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 11h18"/></svg>Schedule</div>
      <div class="item"><svg viewBox="0 0 24 24"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Cashflow</div>
      <div class="item"><svg viewBox="0 0 24 24"><path d="M3 3v18h18M7 14l4-4 4 4 5-5"/></svg>Reports</div>
    </div>
    <div class="right">
      <div class="toolbar">
        <div class="search">
          <svg viewBox="0 0 24 24" style="width:14px;height:14px;"><path d="M21 21l-4.35-4.35M11 19a8 8 0 1 1 0-16 8 8 0 0 1 0 16z"/></svg>
          Search students or transactions…
          <span class="kbd">⌘ K</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
