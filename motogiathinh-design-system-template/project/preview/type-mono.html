<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 32px; background: var(--ink-1); }
  table { border-collapse: collapse; width: 100%; }
  td { padding: 8px 14px 8px 0; }
  td.k { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); letter-spacing: 0.1em; text-transform: uppercase; }
  td.v { font-family: var(--font-mono); color: var(--fg-1); font-variant-numeric: tabular-nums; font-size: 14px; }
  td.d { font-family: var(--font-mono); color: var(--c, var(--fg-2)); font-size: 13px; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <table>
    <tr><td class="k">15:32 · TXN</td><td class="v">TXN-00482</td><td class="v">Trần Văn A · A1</td><td class="d" style="--c: var(--neon-lime);">+₫1.500.000</td></tr>
    <tr><td class="k">14:08 · TXN</td><td class="v">TXN-00481</td><td class="v">Petrol · station 04</td><td class="d" style="--c: var(--neon-pink);">−₫  428.000</td></tr>
    <tr><td class="k">11:55 · TXN</td><td class="v">TXN-00480</td><td class="v">Nguyễn Thị B · B2</td><td class="d" style="--c: var(--neon-lime);">+₫3.000.000</td></tr>
    <tr><td class="k">09:14 · TXN</td><td class="v">TXN-00479</td><td class="v">Maintenance · bike 07</td><td class="d" style="--c: var(--neon-amber);">−₫  120.000</td></tr>
  </table>
</body>
</html>
