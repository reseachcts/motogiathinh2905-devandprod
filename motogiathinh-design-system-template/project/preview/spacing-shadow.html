<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 36px 32px; background: var(--ink-1); }
  .row { display: flex; gap: 24px; align-items: center; justify-content: space-around; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box {
    width: 96px; height: 96px;
    background: var(--ink-2);
    border: 1px solid var(--glass-stroke);
    border-radius: 14px;
  }
  .nm { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-2); }
  .s1 { box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 4px 12px rgba(0,0,0,0.35); }
  .s2 { box-shadow: 0 1px 0 rgba(255,255,255,0.06) inset, 0 12px 32px rgba(0,0,0,0.5); }
  .s3 { box-shadow: 0 1px 0 rgba(255,255,255,0.08) inset, 0 24px 60px rgba(0,0,0,0.6); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="box s1"></div><span class="nm">shadow-1</span></div>
    <div class="col"><div class="box s2"></div><span class="nm">shadow-2</span></div>
    <div class="col"><div class="box s3"></div><span class="nm">shadow-3</span></div>
  </div>
</body>
</html>
