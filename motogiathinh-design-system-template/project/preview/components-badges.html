<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 32px; background: var(--ink-1); }
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .chip {
    font-family: var(--font-ui); font-size: 12px; font-weight: 600;
    padding: 5px 10px; border-radius: 999px; display: inline-flex; gap: 6px; align-items: center;
    background: var(--glass-2); border: 1px solid var(--glass-stroke); color: var(--fg-1);
  }
  .chip .dot { width: 6px; height: 6px; border-radius: 999px; background: var(--c); box-shadow: 0 0 10px var(--g); }
  .chip.solid { background: color-mix(in oklab, var(--c) 14%, transparent); border-color: color-mix(in oklab, var(--c) 36%, transparent); color: var(--c); }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-3); margin-right: 4px; }
</style>
</head>
<body>
  <div class="row" style="margin-bottom: 14px;">
    <span class="lbl">Status</span>
    <span class="chip solid" style="--c: var(--neon-lime); --g: var(--neon-lime-glow);"><span class="dot"></span>Paid</span>
    <span class="chip solid" style="--c: var(--neon-amber); --g: var(--neon-amber-glow);"><span class="dot"></span>Pending</span>
    <span class="chip solid" style="--c: var(--neon-pink); --g: var(--neon-pink-glow);"><span class="dot"></span>Overdue</span>
    <span class="chip solid" style="--c: var(--neon-cyan); --g: var(--neon-cyan-glow);"><span class="dot"></span>In lesson</span>
    <span class="chip solid" style="--c: var(--neon-violet); --g: var(--neon-violet-glow);"><span class="dot"></span>Scheduled</span>
  </div>
  <div class="row">
    <span class="lbl">Tag</span>
    <span class="chip">A1</span>
    <span class="chip">A2</span>
    <span class="chip">B1</span>
    <span class="chip">B2</span>
    <span class="chip">New · Instructor: Hùng</span>
  </div>
</body>
</html>
