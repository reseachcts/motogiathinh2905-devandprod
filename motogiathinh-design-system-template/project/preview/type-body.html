<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--ink-1); }
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .row { display: flex; align-items: baseline; gap: 18px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); letter-spacing: 0.08em; text-transform: uppercase; min-width: 84px; }
</style>
</head>
<body>
  <div class="stack">
    <div class="row"><span class="meta">H4 · 20</span><span class="t-h4">Lesson schedule</span></div>
    <div class="row"><span class="meta">Body</span><span class="t-body">Trần Văn A đã hoàn thành 12/30 giờ thực hành. Còn 3 buổi cho đến ngày thi.</span></div>
    <div class="row"><span class="meta">Strong</span><span class="t-body-strong">3 students owe a balance.</span></div>
    <div class="row"><span class="meta">Small</span><span class="t-small">Updated 2 minutes ago · synced</span></div>
    <div class="row"><span class="meta">Eyebrow</span><span class="t-eyebrow">This week · paid</span></div>
  </div>
</body>
</html>
