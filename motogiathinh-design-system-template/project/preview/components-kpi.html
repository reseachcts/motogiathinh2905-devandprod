<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--ink-1); position: relative; overflow: hidden; }
  body::before { content:""; position:absolute; inset:0;
    background:
      radial-gradient(420px 200px at 18% 30%, var(--neon-cyan-haze), transparent 60%),
      radial-gradient(420px 200px at 88% 70%, var(--neon-violet-haze), transparent 60%); }
  .row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; position: relative; }
  .card {
    background: var(--glass-2); backdrop-filter: var(--glass-blur);
    border: 1px solid var(--glass-stroke); border-radius: 20px;
    padding: 16px 18px; display: flex; flex-direction: column; gap: 10px;
    box-shadow: var(--shadow-2);
  }
  .eyebrow { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-3); }
  .metric { font-family: var(--font-display); font-weight: 500; font-size: 32px; line-height:1; letter-spacing:-0.025em; font-variant-numeric: tabular-nums; color: var(--fg-1); }
  .delta { font-family: var(--font-display); font-weight: 600; font-size: 12px; }
  .row2 { display:flex; align-items: baseline; gap: 8px; }
  .spark { width: 100%; height: 28px; }
</style>
</head>
<body>
  <div class="row">
    <div class="card">
      <span class="eyebrow">Today · Income</span>
      <div class="row2"><span class="metric">₫4.240.000</span></div>
      <span class="delta" style="color: var(--neon-lime);">+12.4% <span style="color: var(--fg-3); font-weight:500;">vs avg</span></span>
    </div>
    <div class="card">
      <span class="eyebrow">Active students</span>
      <div class="row2"><span class="metric">128</span></div>
      <svg class="spark" viewBox="0 0 200 40" preserveAspectRatio="none"><polyline fill="none" stroke="#00E5FF" stroke-width="1.6" points="0,30 25,24 50,28 75,18 100,22 125,14 150,18 175,10 200,12" style="filter: drop-shadow(0 0 4px #00E5FF);"/></svg>
    </div>
    <div class="card">
      <span class="eyebrow">Pending payments</span>
      <div class="row2"><span class="metric">₫6.180.000</span></div>
      <span class="delta" style="color: var(--neon-amber);">3 students <span style="color: var(--fg-3); font-weight:500;">overdue</span></span>
    </div>
  </div>
</body>
</html>
