<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 32px; background: var(--ink-1); }
  .row { display: flex; gap: 18px; align-items: center; }
  .seg {
    display: inline-flex; padding: 4px; background: var(--ink-2);
    border: 1px solid var(--glass-stroke); border-radius: 12px;
  }
  .seg button {
    font-family: var(--font-ui); font-size: 12px; font-weight: 600;
    padding: 7px 12px; border-radius: 8px; border: none; background: transparent;
    color: var(--fg-2); cursor: pointer;
  }
  .seg button.active { background: var(--glass-3); color: var(--fg-1); box-shadow: 0 0 0 1px var(--neon-cyan), 0 0 12px var(--neon-cyan-glow); }

  .toggle {
    width: 40px; height: 24px; background: var(--ink-3); border-radius: 999px;
    border: 1px solid var(--glass-stroke); position: relative; transition: 220ms var(--ease-out);
  }
  .toggle::after { content:""; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; background: var(--fg-2); border-radius: 999px; transition: 220ms var(--ease-out); }
  .toggle.on { background: var(--neon-cyan); border-color: var(--neon-cyan); box-shadow: 0 0 18px var(--neon-cyan-glow); }
  .toggle.on::after { left: 18px; background: var(--ink-0); }

  .check { width: 18px; height: 18px; border-radius: 5px; border: 1px solid var(--glass-stroke-strong); background: var(--ink-2); }
  .check.on { background: var(--neon-cyan); border-color: var(--neon-cyan); box-shadow: 0 0 12px var(--neon-cyan-glow); position: relative; }
  .check.on::after { content:""; position: absolute; left: 4px; top: 2px; width: 5px; height: 9px; border: solid var(--ink-0); border-width: 0 2px 2px 0; transform: rotate(45deg); }

  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-3); }
</style>
</head>
<body>
  <div class="row">
    <div class="seg">
      <button>Day</button>
      <button class="active">Week</button>
      <button>Month</button>
      <button>Year</button>
    </div>
    <div style="flex:1;"></div>
    <div class="row" style="gap:8px;"><span class="toggle on"></span><span class="lbl">On</span></div>
    <div class="row" style="gap:8px;"><span class="toggle"></span><span class="lbl">Off</span></div>
    <div class="row" style="gap:8px;"><span class="check on"></span><span class="check"></span><span class="lbl">Check</span></div>
  </div>
</body>
</html>
